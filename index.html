<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Tema Laut</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #0077be, #00c6ff);
            color: white;
        }

        header {
            background-color: rgba(0,0,0,0.5);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        .gallery img {
            margin: 10px;
            border-radius: 10px;
            width: 300px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<header>
    <h1>🌊 Website Tema Laut</h1>
    <nav>
        <a href="#home">Beranda</a>
        <a href="#biodata">Biodata</a>
        <a href="#galeri">Galeri</a>
        <a href="#video">Video</a>
    </nav>
</header>

<section id="home">
    <h2>Selamat Datang</h2>
    <p>Website ini bertema laut yang menampilkan keindahan alam bawah laut.</p>
</section>

<section id="biodata">
    <h2>Biodata</h2>
    <ul style="list-style:none;">
        <li>Nama: [Isi Nama]</li>
        <li>Umur: [Isi Umur]</li>
        <li>Hobi: Menjelajah Laut</li>
    </ul>
</section>

<section id="galeri" class="gallery">
    <h2>Galeri Laut</h2>
    <img src="https://source.unsplash.com/300x200/?ocean" alt="laut">
    <img src="https://source.unsplash.com/300x200/?sea" alt="laut">
    <img src="https://source.unsplash.com/300x200/?underwater" alt="laut">
</section>

<section id="video">
    <h2>Video Laut</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/6zrn4-FfbXw" frameborder="0" allowfullscreen></iframe>
</section>

<footer>
    <p>© 2026 Tema Laut</p>
</footer>

</body>
</html>
