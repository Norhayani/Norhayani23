<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Biodata Tema Laut</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #00c6ff, #0072ff);
      color: white;
      text-align: center;
    }

    header {
      background-color: rgba(0,0,0,0.5);
      padding: 15px;
    }

    .container {
      margin-top: 30px;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
    }

    .card {
      background: rgba(0,0,0,0.4);
      display: inline-block;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    p {
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Biodata Saya</h1>
  </header>

  <div class="container">
    <img src="https://source.unsplash.com/150x150/?person" alt="Foto Profil" class="profile-img">

    <div class="card">
      <p><strong>Nama:</strong> Nama Anda</p>
      <p><strong>Umur:</strong> 20 Tahun</p>
      <p><strong>Hobi:</strong> Menjelajah laut</p>
      <p><strong>Alamat:</strong> Indonesia</p>
      <p><strong>Deskripsi:</strong> Saya sangat menyukai keindahan laut dan kehidupan bawah air.</p>
    </div>
  </div>

</body>
</html>
